<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .header {
      text-align: center;
      margin-bottom: 14px;
    }
    .header h2 {
      font-size: 14px;
      color: #888;
      font-weight: 500;
    }
    .queue-number {
      text-align: center;
      margin-bottom: 16px;
    }
    .queue-number .label {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }
    .queue-number .value {
      font-size: 42px;
      font-weight: 700;
      color: #00d4ff;
      font-variant-numeric: tabular-nums;
    }
    .queue-number .value.unknown {
      font-size: 18px;
      color: #666;
    }
    .thresholds {
      margin-bottom: 14px;
    }
    .threshold-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      margin-bottom: 4px;
      background: #16213e;
      border-radius: 6px;
      font-size: 13px;
    }
    .threshold-row.triggered {
      opacity: 0.5;
    }
    .threshold-row .badge {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.waiting {
      background: #2d4a2e;
      color: #4caf50;
    }
    .badge.done {
      background: #3d3d3d;
      color: #aaa;
    }
    .reset-btn {
      width: 100%;
      padding: 8px;
      border: 1px solid #444;
      border-radius: 6px;
      background: transparent;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .reset-btn:hover {
      background: #16213e;
      color: #e0e0e0;
      border-color: #666;
    }
    .no-data {
      text-align: center;
      color: #666;
      font-size: 12px;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>Interpark 排队监控</h2>
  </div>
  <div class="queue-number" id="queueSection">
    <div class="label">当前排队序号</div>
    <div class="value unknown" id="queueValue">--</div>
  </div>
  <div class="thresholds" id="thresholdsSection"></div>
  <button class="reset-btn" id="resetBtn">重置通知</button>
  <script src="popup.js"></script>
</body>
</html>
